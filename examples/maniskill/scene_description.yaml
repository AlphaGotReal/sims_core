sim_name:   workcell
robot_name: piper
env_name:   BimanualStaticWorkcell-v0

num_envs: 4
backend: "cuda:0" # "auto" uses cpu when n = 1

robot:
  urdf:     ../test.urdf
  fix_root: true
  pose:     [0.0, 0.0, 0.0]

background:
  type: ground

scene:
  objects:
#     - name:   small_box
#       type:   box
#       static: false
#       size:   [0.03, 0.03, 0.03]
#       color:  [0.2, 0.5, 0.8, 1.0]
#       pose:   [0.4, 0.1, 2.0]

    - name:   cardboard_box
      type:   urdf
      path:   ../cardboard_box.urdf
      static: false
      pose:   [0.5, 0.0, 1.6]

randomization:
  objects:
    - name: cardboard_box
      x: [0.5, 0.7]
      y: [-0.4, 0.4]
      yaw: [0, 1.57]

lighting:
  ambient: [0.4, 0.0, 0.4]
  sources:
    - type:      directional
      direction: [0.3, -0.5, -1.0]
      color:     [0.0, 0.95, 0.0]
      shadow:    true

render:
  gui: false
  camera:
    eye:    [-0.8, 1.0, 2.0]
    target: [0.0, 1.0, 1.0]
    width:  1280
    height: 720
